name: 🐛 Bug Report
description: Report a bug or defect in OpenCare-Core
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please provide as much detail as possible to help us fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: "The patient records endpoint returns a 500 error when..."
    validations:
      required: true

  - type: dropdown
    id: affected-area
    attributes:
      label: Affected Area
      description: What part of the system does this affect?
      options:
        - API
        - Authentication
        - Patients
        - Health Workers
        - Facilities
        - Records
        - Analytics
        - Appointments
        - Documentation
        - CI/CD
        - Security
        - Other
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug? Be as specific as possible.
      placeholder: |
        1. Create a new patient with `POST /api/patients/`
        2. Retrieve the patient with `GET /api/patients/{id}/`
        3. See the error...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: "The endpoint should return a 200 with the patient data"
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened instead?
      placeholder: "Instead, the endpoint returns a 500 Internal Server Error"
    validations:
      required: true

  - type: textarea
    id: logs-screenshots
    attributes:
      label: Error Logs / Screenshots
      description: Paste error messages, stack traces, or screenshots.
      placeholder: |
        ```
        Traceback (most recent call last):
          File "...", line X, in function_name
            ...
        AttributeError: 'NoneType' object has no attribute 'field'
        ```
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Relevant system information
      placeholder: |
        - Python version: 3.11
        - Django version: 4.2
        - Database: PostgreSQL 14
        - OS: macOS / Linux / Windows
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I can reproduce this issue with clear steps
          required: true
