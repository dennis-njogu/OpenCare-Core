name: 🐛 Bug Report
description: Report a bug or issue with OpenCare-Core
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please provide as much detail as possible to help us fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: "What's the bug about?"
    validations:
      required: true

  - type: dropdown
    id: affected-area
    attributes:
      label: Affected Area
      description: What part of the system does this affect?
      options:
        - API
        - Authentication
        - Patients
        - Health Workers
        - Facilities
        - Records
        - Analytics
        - Appointments
        - Documentation
        - CI/CD
        - Security
        - Other
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to...
        2. Click on...
        3. See the error...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: "The system should..."
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: "Instead, the system..."
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Estimated Difficulty
      description: How difficult do you think this fix might be?
      options:
        - Beginner
        - Intermediate
        - Advanced
        - Not sure
    validations:
      required: false

  - type: textarea
    id: logs-screenshots
    attributes:
      label: Logs / Screenshots
      description: Attach error logs, screenshots, or stack traces if available.
      placeholder: "Paste logs or upload files..."
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Relevant environment information (Python version, Django version, OS, etc.)
      placeholder: |
        - Python: 3.x
        - Django: 4.x
        - OS: macOS/Linux/Windows
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: This issue is reproducible with clear steps
          required: true
        - label: I have provided error logs or relevant context
          required: false
