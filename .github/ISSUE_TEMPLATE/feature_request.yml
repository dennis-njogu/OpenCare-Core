name: ✨ Feature Request
description: Propose a new feature or enhancement for OpenCare-Core
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an enhancement! We appreciate ideas that help us improve OpenCare-Core.

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: Describe the problem or use case this feature would solve.
      placeholder: "Users currently cannot... which makes it difficult to..."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed solution or feature.
      placeholder: "We should implement... by..."
    validations:
      required: true

  - type: dropdown
    id: feature-area
    attributes:
      label: Feature Area
      description: What part of the system would this feature affect?
      options:
        - API
        - Authentication
        - Patients
        - Health Workers
        - Facilities
        - Records
        - Analytics
        - Appointments
        - Documentation
        - CI/CD
        - Infrastructure
        - Other
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Estimated Difficulty
      description: How complex do you think this implementation might be?
      options:
        - Beginner
        - Intermediate
        - Advanced
        - Not sure
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or workarounds you've considered.
      placeholder: "Option A would... but... Option B would..."
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, links, or research that might be helpful.
      placeholder: "Related issues: #123, #456..."
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: This feature aligns with OpenCare-Core's project scope
          required: true
        - label: I have provided sufficient context and use cases
          required: false
